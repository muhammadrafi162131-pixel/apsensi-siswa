<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scan Presensi Siswa</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #222;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
        }
        .loading { background-color: #ffeeba; color: #856404; display: none; }
        .success { background-color: #d4edda; color: #155724; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan QR Code Absensi</h2>
    <p>Arahkan kode QR Siswa ke kamera</p>
    
    <div id="reader"></div>
    
    <div id="status-loading" class="status loading">Memproses data & mengirim WhatsApp...</div>
    <div id="status-success" class="status success">Absensi Berhasil Dicatat!</div>
</div>

<script>
    // URL Web App dari Google Apps Script yang sudah Anda Deploy tadi
    const WEB_APP_URL = "PASANG_URL_WEB_APP_ANDA_DISINI"; 

    function onScanSuccess(decodedText, decodedResult) {
        // Hentikan scanner sementara agar tidak scan berkali-kali
        html5QrcodeScanner.clear();
        
        document.getElementById('status-loading').style.display = 'block';

        /* ASUMSI ISI QR CODE ADALAH FORMAT JSON SEPERTI INI:
          {
            "nis": "12345",
            "nama": "Budi Santoso",
            "ortu": "6281234567890",
            "status": "Hadir"
          }
        */
        try {
            let dataSiswa = JSON.parse(decodedText);

            // Mengirim data ke Google Sheets & WhatsApp melalui Google Apps Script
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(dataSiswa),
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status-loading').style.display = 'none';
                if(data.result === "success") {
                    document.getElementById('status-success').style.display = 'block';
                    
                    // Nyalakan kembali scanner setelah 3 detik untuk siswa berikutnya
                    setTimeout(() => {
                        document.getElementById('status-success').style.display = 'none';
                        renderScanner();
                    }, 3000);
                } else {
                    alert("Gagal mencatat data: " + data.error);
                    renderScanner();
                }
            })
            .catch(error => {
                document.getElementById('status-loading').style.display = 'none';
                alert("Terjadi kesalahan jaringan/sistem.");
                renderScanner();
            });

        } catch (e) {
            alert("Format QR Code salah / Tidak dikenali.");
            renderScanner();
        }
    }

    function onScanFailure(error) {
        // Abaikan error scan gagal (kamera sedang mencari QR)
    }

    function renderScanner() {
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Menjalankan Scanner pertama kali
    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    renderScanner();
</script>

</body>
</html>
